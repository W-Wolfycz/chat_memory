name: chat_memory
display_name: ChatMemory
description: 独立对话记录存档，以 UMO + conversation_id + 用户ID 为维度存储全量对话文本，双列状态（llm_status 描述 LLM 路径，content_kind JSON 数组描述内容形态），暴露查询接口供其他插件调用。可选开启上下文接管，让 CM 成为唯一上下文源（跨重启 / 跨会话 / 跨用户）。
version: 1.0.0
author: Wolfycz
repo: "https://github.com/W-Wolfycz/chat_memory"
astrbot_version: ">=4.16,<5"
